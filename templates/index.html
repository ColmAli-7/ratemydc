<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RateMyDC</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #111;
        }

        .wrapper {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: white;
            width: 100%;
            max-width: 420px;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            margin: 0;
            font-size: 24px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 14px;
            font-size: 14px;
            font-weight: 500;
        }

        input, select, textarea {
            width: 100%;
            margin-top: 6px;
            padding: 11px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 16px;
            transition: 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 2px rgba(37,99,235,0.2);
        }

        textarea {
            resize: vertical;
        }

        .rating {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        .rating button {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            background: #f8fafc;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .rating button.active {
            background: #2563eb;
            color: white;
            border-color: #2563eb;
        }

        .submit-btn {
            margin-top: 20px;
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .submit-btn:hover {
            background: #1d4ed8;
        }

        .success {
            text-align: center;
            background: #dcfce7;
            color: #166534;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }

        @media (max-width: 480px) {
            .card {
                padding: 20px;
            }
        }
    </style>
</head>

<body>

<div class="wrapper">
    <div class="card">

        <h1>RateMyDC</h1>
        <div class="subtitle">Give feedback on your teachers</div>
        <div class="subtitle">(Not affiliated with DC: any rude or derogatory comments will be removed)</div>
        <div class="success" id="successMsg">
            Review submitted ✓
        </div>

        <form method="POST" action="/submit" onsubmit="showSuccess()">

            <label>Your Name</label>
            <input type="text" name="name" required>

            <label>Subject</label>
            <select id="subjectSelect" required>
                <option value="">Select subject</option>
                {% for subject in subjects %}
                    <option value="{{ subject.id }}">{{ subject.name }}</option>
                {% endfor %}
            </select>

            <label>Teacher</label>
            <select name="teacher" id="teacherSelect" required>
                <option value="">Select teacher</option>
            </select>

            <label>Rating</label>
            <div class="rating" id="ratingButtons">
                {% for i in range(1,6) %}
                    <button type="button" onclick="setRating({{ i }}, this)">{{ i }}</button>
                {% endfor %}
            </div>
            <input type="hidden" name="rating" id="ratingInput" required>

            <label>Review</label>
            <textarea name="review" rows="4" required></textarea>

            <button class="submit-btn" type="submit">Submit Review</button>
        </form>
    </div>
</div>

<script>
    const subjectSelect = document.getElementById("subjectSelect");
    const teacherSelect = document.getElementById("teacherSelect");

    const teacherData = {
        {% for subject in subjects %}
        "{{ subject.id }}": [
            {% for teacher in subject.teachers %}
            { id: {{ teacher.id }}, name: "{{ teacher.name }}" }{% if not loop.last %},{% endif %}
            {% endfor %}
        ]{% if not loop.last %},{% endif %}
        {% endfor %}
    };

    subjectSelect.addEventListener("change", function() {
        const subjectId = this.value;
        teacherSelect.innerHTML = '<option value="">Select teacher</option>';

        if (teacherData[subjectId]) {
            teacherData[subjectId].forEach(t => {
                const option = document.createElement("option");
                option.value = t.id;
                option.textContent = t.name;
                teacherSelect.appendChild(option);
            });
        }
    });

    function setRating(value, el) {
        document.getElementById("ratingInput").value = value;

        document.querySelectorAll("#ratingButtons button").forEach(btn => {
            btn.classList.remove("active");
        });

        el.classList.add("active");
    }

    function showSuccess() {
        const msg = document.getElementById("successMsg");
        msg.style.display = "block";
    }
</script>

</body>
</html>
